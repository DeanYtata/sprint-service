spring.application.name=api-gateway
server.port=8080

# Configuración de rutas
# Si llega algo a /auth/**, lo manda al puerto 8081 (Auth Service)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Si llega algo a /catalog/**, lo manda al puerto 8082 (Catalog Service)
spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/catalog/**

# Si llega algo a /orders/**, lo manda al puerto 8083 (Order Service)
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**

# Habilitar health check para el Gateway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always